name: Build Windows EXE

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pypoetry\Cache
            .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Install deps
        run: poetry install --no-root

      - name: Install Playwright Chromium
        run: poetry run playwright install chromium

      - name: Build EXE
        run: poetry run pyinstaller pyinstaller.spec --clean --noconfirm

      - name: Package distribution
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force consig-bot-windows, consig-bot-windows\entrada, consig-bot-windows\saida | Out-Null
          Copy-Item dist\consig-bot.exe consig-bot-windows\
          Copy-Item executar.bat consig-bot-windows\
          Copy-Item config.example.json consig-bot-windows\config.json
          Compress-Archive -Path consig-bot-windows -DestinationPath consig-bot-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: consig-bot-windows
          path: consig-bot-windows.zip
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: consig-bot-windows.zip
